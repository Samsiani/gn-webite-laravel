name: Deploy to laravel.gn.ge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/laravel.gn.ge/public_html
            git pull origin main
            /usr/local/lsws/lsphp84/bin/php artisan optimize:clear
            /usr/local/lsws/lsphp84/bin/php artisan route:cache
            /usr/local/lsws/lsphp84/bin/php artisan view:cache
            npm run build
            echo "Deployed at $(date)"
